name: Generate CV PDF

on:
  push:
    branches:
      - main
    paths:
      - 'docs/cv/resume/caroline-maguire-cv.html'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate PDF
        run: node generate-cv-pdf.js

      - name: Commit PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cv/resume/caroline-maguire-cv.pdf
          git diff --cached --quiet || git commit -m "Auto-generate CV PDF"
          git push
